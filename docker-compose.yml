version: '3.8'

services:
  # ── Local Postgres (mimics Bronze source for dev) ──────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud_dev_123
      POSTGRES_DB: fraud_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 5s
      retries: 5

  # ── Kafka (local substitute for Azure Event Hubs) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 5

  # ── Airflow (scheduler + webserver) ───────────────────────────────────────
  airflow-init:
    image: apache/airflow:2.8.1
    depends_on: [postgres]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://fraud:fraud_dev_123@postgres/fraud_dev
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command: >
      bash -c "airflow db init && airflow users create
        --username admin --password admin
        --firstname Admin --lastname User
        --role Admin --email admin@example.com"

  airflow-scheduler:
    image: apache/airflow:2.8.1
    depends_on: [airflow-init]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://fraud:fraud_dev_123@postgres/fraud_dev
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - ./airflow:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project
      - ./quality:/opt/airflow/quality
    command: airflow scheduler

  airflow-webserver:
    image: apache/airflow:2.8.1
    depends_on: [airflow-scheduler]
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://fraud:fraud_dev_123@postgres/fraud_dev
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./airflow:/opt/airflow/dags
    ports:
      - "8080:8080"
    command: airflow webserver

volumes:
  postgres_data:
